trigger:
  - main

pool:
  name: wedding-palette-devopps-agent-pool

variables:
  phpVersion: '8.2'

steps:


# STEP 1: PHP Version Verify

- script: php -v
  displayName: '✅ Verify PHP Version'


# STEP 2: Composer Dependencies Install

- script: |
    composer install \
      --no-interaction \
      --prefer-dist \
      --optimize-autoloader \
      --no-dev
  displayName: '📦 Install Composer Dependencies'


# STEP 3: NPM Install & Build (Frontend)

- script: |
    npm ci
    npm run build
  displayName: '🎨 Build Frontend Assets'


# STEP 4: .env file তৈরি করো

- script: |
    cat > .env << 'ENVEOF'
    APP_NAME=Laravel
    APP_ENV=production
    APP_KEY=
    APP_DEBUG=false
    APP_URL=https://wedding-palette-dev-backend.azurewebsites.net
    DB_CONNECTION=mysql
    DB_HOST=$(DB_HOST)
    DB_PORT=3306
    DB_DATABASE=$(DB_DATABASE)
    DB_USERNAME=$(DB_USERNAME)
    DB_PASSWORD=$(DB_PASSWORD)
    CACHE_DRIVER=file
    SESSION_DRIVER=file
    QUEUE_CONNECTION=sync
    ENVEOF
    php artisan key:generate --force
  displayName: '🔑 Setup Environment'
  env:
    DB_HOST: $(DB_HOST)
    DB_DATABASE: $(DB_DATABASE)
    DB_USERNAME: $(DB_USERNAME)
    DB_PASSWORD: $(DB_PASSWORD)


# STEP 5: Laravel Optimize করো

- script: |
    php artisan config:cache
    php artisan route:cache
    php artisan view:cache
  displayName: '⚡ Optimize Laravel'


# STEP 6: Storage link তৈরি করো

- script: php artisan storage:link
  displayName: '🔗 Create Storage Link'


# STEP 7: Permissions ঠিক করো

- script: |
    chmod -R 775 storage bootstrap/cache
  displayName: 'Set Folder Permissions'



# STEP 8: Zip package

- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: '$(Build.SourcesDirectory)'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/wedding-palette-backend.zip'
    replaceExistingArchive: true
    excludeFiles: |
      node_modules/**
      vendor/**
      .git/**
      .vscode/**
      tests/**
      .env
  displayName: '📦 Create Deployment Package'



# STEP 9: Publish Artifact

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'wedding-palette-conn'
    appType: 'webAppLinux'
    appName: 'wedding-palette-dev-backend'
    package: '$(Build.ArtifactStagingDirectory)/wedding-palette-backend.zip'
  displayName: '🚀 Deploy to Azure Web App'
